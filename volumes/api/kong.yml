# IMPORTANTE: Sostituire "https://r6hub.yourdomain.com" con dominio production
# prima del deploy. Configurare anche NEXT_PUBLIC_SITE_URL in .env
_format_version: '2.1'
_transform: true

###
### Consumers / Users
###
consumers:
  - username: DASHBOARD
  - username: anon
    keyauth_credentials:
      - key: $SUPABASE_ANON_KEY
  - username: service_role
    keyauth_credentials:
      - key: $SUPABASE_SERVICE_KEY

###
### Access Control List
###
acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

###
### Dashboard credentials
###
basicauth_credentials:
  - consumer: DASHBOARD
    username: '$DASHBOARD_USERNAME'
    password: '$DASHBOARD_PASSWORD'

###
### API Routes
###
services:
  ## Open Auth routes
  - name: auth-v1-open
    _comment: 'Auth: /auth/v1/verify* -> http://auth:9999/verify*'
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
  - name: auth-v1-open-callback
    _comment: 'Auth: /auth/v1/callback* -> http://auth:9999/callback*'
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
  - name: auth-v1-open-authorize
    _comment: 'Auth: /auth/v1/authorize* -> http://auth:9999/authorize*'
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true

  ## Secure Auth routes
  - name: auth-v1
    _comment: 'Auth: /auth/v1/* -> http://auth:9999/*'
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
          replace:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## Secure PostgREST routes
  - name: rest-v1
    _comment: 'PostgREST: /rest/v1/* -> http://rest:3000/*'
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
          replace:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## Secure GraphQL routes
  - name: graphql-v1
    _comment: 'PostgREST: /graphql/v1/* -> http://rest:3000/rpc/graphql'
    url: http://rest:3000/rpc/graphql
    routes:
      - name: graphql-v1-all
        strip_path: true
        paths:
          - /graphql/v1
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false
      - name: request-transformer
        config:
          add:
            headers:
              - "Content-Profile: graphql_public"
              - "Authorization: $LUA_AUTH_EXPR"
          replace:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## Secure Realtime routes
  - name: realtime-v1-ws
    _comment: 'Realtime: /realtime/v1/* -> ws://realtime:4000/socket/*'
    url: http://realtime-dev.supabase-realtime:4000/socket
    protocol: ws
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false
      - name: request-transformer
        config:
          add:
            headers:
              - "x-api-key:$LUA_RT_WS_EXPR"
          replace:
            querystring:
              - "apikey:$LUA_RT_WS_EXPR"
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  - name: realtime-v1-rest
    _comment: 'Realtime: /realtime/v1/api/* -> http://realtime:4000/api/*'
    url: http://realtime-dev.supabase-realtime:4000/api
    protocol: http
    routes:
      - name: realtime-v1-rest
        strip_path: true
        paths:
          - /realtime/v1/api
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
      - name: key-auth
        config:
          hide_credentials: false
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
          replace:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## Storage API routes
  - name: storage-v1
    _comment: 'Storage: /storage/v1/* -> http://storage:5000/*'
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
          replace:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"

  ## Secure Database routes (pg-meta)
  - name: meta
    _comment: 'pg-meta: /pg/* -> http://meta:8080/*'
    url: http://meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

  ## Protected Dashboard - catch all remaining routes
  - name: dashboard
    _comment: 'Studio: /* -> http://studio:3000/*'
    url: http://studio:3000/
    routes:
      - name: dashboard-all
        strip_path: true
        paths:
          - /
    plugins:
      - name: cors
        config:
          origins:
            - "https://r6hub.yourdomain.com"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - Apikey
            - X-Supabase-Api-Key
            - x-supabase-api-version
            - accept-profile
            - content-profile
            - x-retry-count
          exposed_headers:
            - X-Supabase-Api-Key
          max_age: 3600
          credentials: true
      - name: basic-auth
        config:
          hide_credentials: true
